<svg xmlns="http://www.w3.org/2000/svg" width="320" height="420" viewBox="0 0 320 420">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#EDE4FF"/>
      <stop offset="100%" stop-color="#D4C2FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#9b7bf0" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="320" height="420" rx="18" fill="url(#card-bg)" filter="url(#card-shadow)"/>

  <!-- Glow -->
  <ellipse cx="160" cy="0" rx="220" ry="120" fill="url(#glow)" opacity="0.4"/>

  <!-- Header -->
  <text x="14" y="35" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#2E1F4D">Work Tasks</text>

  <!-- Pin icon hint -->
  <rect x="270" y="14" width="26" height="26" rx="7" fill="none"/>
  <text x="278" y="33" font-family="system-ui" font-size="13" fill="#7A6AA0">📌</text>

  <!-- Todo items -->
  <g transform="translate(14, 56)">
    <!-- Item 1 - unchecked -->
    <rect x="0" y="0" width="292" height="34" rx="9" fill="rgba(255,255,255,0.3)"/>
    <rect x="8" y="8" width="18" height="18" rx="6" fill="rgba(255,255,255,0.55)" stroke="#E0D2FF" stroke-width="2"/>
    <text x="34" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#2E1F4D">Review pull requests</text>

    <!-- Item 2 - unchecked -->
    <rect x="0" y="40" width="292" height="34" rx="9" fill="rgba(255,255,255,0.3)"/>
    <rect x="8" y="48" width="18" height="18" rx="6" fill="rgba(255,255,255,0.55)" stroke="#E0D2FF" stroke-width="2"/>
    <text x="34" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#2E1F4D">Update documentation</text>

    <!-- Item 3 - checked -->
    <rect x="0" y="80" width="292" height="34" rx="9" fill="rgba(255,255,255,0.2)"/>
    <rect x="8" y="88" width="18" height="18" rx="6" fill="#9B7BF0"/>
    <text x="13" y="101" font-family="system-ui" font-size="11" fill="white">✓</text>
    <text x="34" y="102" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#2E1F4D" opacity="0.5" text-decoration="line-through">Deploy staging build</text>

    <!-- Item 4 - unchecked -->
    <rect x="0" y="120" width="292" height="34" rx="9" fill="rgba(255,255,255,0.3)"/>
    <rect x="8" y="128" width="18" height="18" rx="6" fill="rgba(255,255,255,0.55)" stroke="#E0D2FF" stroke-width="2"/>
    <text x="34" y="142" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#2E1F4D">Fix login bug #42</text>

    <!-- Item 5 - checked -->
    <rect x="0" y="160" width="292" height="34" rx="9" fill="rgba(255,255,255,0.2)"/>
    <rect x="8" y="168" width="18" height="18" rx="6" fill="#9B7BF0"/>
    <text x="13" y="181" font-family="system-ui" font-size="11" fill="white">✓</text>
    <text x="34" y="182" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#2E1F4D" opacity="0.5" text-decoration="line-through">Set up CI pipeline</text>

    <!-- Item 6 - unchecked -->
    <rect x="0" y="200" width="292" height="34" rx="9" fill="rgba(255,255,255,0.3)"/>
    <rect x="8" y="208" width="18" height="18" rx="6" fill="rgba(255,255,255,0.55)" stroke="#E0D2FF" stroke-width="2"/>
    <text x="34" y="222" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#2E1F4D">Write unit tests</text>
  </g>

  <!-- Clear done button -->
  <rect x="230" y="310" width="60" height="22" rx="11" fill="rgba(255,255,255,0.5)"/>
  <text x="260" y="325" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7A6AA0" text-anchor="middle">2 ✓</text>

  <!-- Input footer -->
  <rect x="14" y="370" width="292" height="38" rx="12" fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
  <text x="24" y="394" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#7A6AA0" opacity="0.7">Add a todo...</text>
  <rect x="272" y="374" width="30" height="30" rx="9" fill="#9B7BF0"/>
  <text x="287" y="394" font-family="system-ui" font-size="16" fill="white" text-anchor="middle">+</text>

  <!-- Counter -->
  <text x="14" y="410" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#7A6AA0" opacity="0.55">4</text>
</svg>
