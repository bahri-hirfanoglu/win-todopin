<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200">
  <defs>
    <linearGradient id="t-peach" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFE4D6"/><stop offset="100%" stop-color="#FFC8A8"/>
    </linearGradient>
    <linearGradient id="t-lavender" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#EDE4FF"/><stop offset="100%" stop-color="#D4C2FF"/>
    </linearGradient>
    <linearGradient id="t-mint" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#D8F5E3"/><stop offset="100%" stop-color="#A8E6C1"/>
    </linearGradient>
    <linearGradient id="t-sky" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#DCEEFF"/><stop offset="100%" stop-color="#B4DBFF"/>
    </linearGradient>
    <linearGradient id="t-sunny" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFF4C2"/><stop offset="100%" stop-color="#FFE382"/>
    </linearGradient>
    <linearGradient id="t-rose" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFD9E5"/><stop offset="100%" stop-color="#FFB3CE"/>
    </linearGradient>
    <linearGradient id="t-slate" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#E8ECF1"/><stop offset="100%" stop-color="#C7CFDA"/>
    </linearGradient>
    <filter id="ts">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Card color themes -->
  <g filter="url(#ts)">
    <rect x="10" y="10" width="90" height="140" rx="14" fill="url(#t-peach)"/>
    <text x="55" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#4A2C1A" text-anchor="middle">Peach</text>
    <rect x="28" y="100" width="54" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="28" y="114" width="40" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

    <rect x="110" y="10" width="90" height="140" rx="14" fill="url(#t-lavender)"/>
    <text x="155" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#2E1F4D" text-anchor="middle">Lavender</text>
    <rect x="128" y="100" width="54" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="128" y="114" width="40" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

    <rect x="210" y="10" width="90" height="140" rx="14" fill="url(#t-mint)"/>
    <text x="255" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1F4030" text-anchor="middle">Mint</text>
    <rect x="228" y="100" width="54" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="228" y="114" width="40" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

    <rect x="310" y="10" width="90" height="140" rx="14" fill="url(#t-sky)"/>
    <text x="355" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1C3352" text-anchor="middle">Sky</text>
    <rect x="328" y="100" width="54" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="328" y="114" width="40" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

    <rect x="410" y="10" width="90" height="140" rx="14" fill="url(#t-sunny)"/>
    <text x="455" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#4A3500" text-anchor="middle">Sunny</text>
    <rect x="428" y="100" width="54" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="428" y="114" width="40" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

    <rect x="510" y="10" width="90" height="140" rx="14" fill="url(#t-rose)"/>
    <text x="555" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#4A1E2D" text-anchor="middle">Rose</text>
    <rect x="528" y="100" width="54" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="528" y="114" width="40" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

    <rect x="610" y="10" width="90" height="140" rx="14" fill="url(#t-slate)"/>
    <text x="655" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1F2933" text-anchor="middle">Slate</text>
    <rect x="628" y="100" width="54" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="628" y="114" width="40" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  </g>

  <text x="360" y="180" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#7a6a8f" text-anchor="middle">7 card color themes</text>
</svg>
