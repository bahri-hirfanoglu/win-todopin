<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoPin — Manager</title>
    <style>
      body { margin: 0; background: linear-gradient(160deg, #fdfbff 0%, #f4efff 60%, #ffeaf2 100%); }
      .splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        background: linear-gradient(160deg, #fdfbff 0%, #f4efff 60%, #ffeaf2 100%);
        transition: opacity 300ms ease;
      }
      .splash.fade-out { opacity: 0; pointer-events: none; }
      .splash-logo {
        width: 52px; height: 52px; border-radius: 16px;
        background: linear-gradient(135deg, #ff8a5b, #f06192 50%, #9b7bf0);
        box-shadow: 0 12px 32px rgba(240, 97, 146, 0.35);
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      .splash-text {
        font-family: "Inter", "Segoe UI", sans-serif;
        font-size: 15px; font-weight: 600; color: #5c4a7a;
        letter-spacing: -0.01em;
      }
      .splash-dots { display: flex; gap: 6px; }
      .splash-dots span {
        width: 6px; height: 6px; border-radius: 50%;
        background: #9b7bf0; opacity: 0.3;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes dot-bounce {
        0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(-4px); }
      }
    </style>
  </head>
  <body data-window="manager">
    <div id="splash" class="splash">
      <div class="splash-logo"></div>
      <div class="splash-text">TodoPin</div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/manager/main.ts"></script>
  </body>
</html>
